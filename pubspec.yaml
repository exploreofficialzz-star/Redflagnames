name: redflag_names
description: RedFlag Names - Funny Relationship Name Analyzer
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Ads
  google_mobile_ads: ^5.1.0

  # Notifications
  flutter_local_notifications: ^17.2.4

  # Audio
  audioplayers: ^6.1.0

  # Sharing / Screenshot
  share_plus: ^10.1.3
  screenshot: ^3.0.0

  # Storage
  shared_preferences: ^2.3.3
  path_provider: ^2.1.5

  # UI
  google_fonts: ^6.2.1
  flutter_animate: ^4.5.0
  lottie: ^3.1.3
  percent_indicator: ^4.2.4
  shimmer: ^3.0.0

  # Permissions
  permission_handler: ^11.3.1

  # Utils
  uuid: ^4.5.1
  intl: ^0.19.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/sounds/

